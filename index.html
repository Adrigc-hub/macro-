<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- MANIFEST CON ICONO FORZADO EN HD -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIlN0ZWxhciBNYWNybyIsICJzaG9ydF9uYW1lIjogIlN0ZWxhck1hY3JvIiwgInN0YXJ0X3VybCI6ICIuIiwgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwNTA2MGYiLCAidGhlbWVfY29sb3IiOiAiIzAwYWZmZiIsICJpY29ucyI6IFt7InNyYyI6ICJkYXRhOmltYWdlL3N2Zyt4bWw7YmFzZTY0LFBITmhkbVp5SW50b2N3b2daR0YwWVNJZ2V6SjNMV052YkdVb2pSMmR6TG5jekxuTnlaM2N2TWpBd01DOWpZWFJuSWdadmFXZDFZbTkyYjI0Z2RUbHdaVzRpTENJZ2V6STZPakV3TUNJZ2V6STZPakV3TUNKbFpYTWdlbUp6SWdadmJXMWxjeUlnYm1GdFpTSTZJQ0paZDJjZ0lDSjVJQ0pkWm1sc2JDSTZJQ0ptYVd4c2N5SWdiV0YyWlhJZ2MzUjliV1VnZXlKamFYSmpiR1VnWTNnOUp6UXdJQ0p6ZURVOUp6UXdJQ0p5UFQwd0p6UXdJQ0ptYVc1c2JEMGdaWGg1Yld3Z2RtbGxkM0p2ZURwaVlYTmxaRFl6TkNKOUxqdz0iLCAic2l6ZXMiOiAiMTkyeDE5MiIsICJ0eXBlIjogImltYWdlL3N2Zyt4bWwiLCAicHVycG9zZSI6ICJhbnkgaX crappyIn1dfQ==">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
        body { background: #04050e; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* PANTALLA DE CARGA */
        #loaderScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #090c1f 0%, #020307 100%);
            z-index: 20000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.6s ease-in-out;
        }
        .protogen-box { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #protogenCanvas { width: 200px; height: 200px; image-rendering: pixelated; }
        .loading-bar-container {
            width: 240px; height: 6px; background: rgba(255, 255, 255, 0.1);
            border-radius: 3px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(0, 188, 255, 0.2);
        }
        .loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #b23b19, #f9b233); box-shadow: 0 0 8px #f9b233; }
        .loading-text { color: #f9b233; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* INTERFAZ PRINCIPAL */
        .app-shell { display: flex; flex-direction: column; height: 100%; }
        .navbar { height: 60px; background: rgba(8, 11, 26, 0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #162044; }
        .navbar h1 { font-size: 18px; color: #f9b233; font-weight: 900; }
        .nav-controls { display: flex; gap: 8px; }
        .nav-btn { border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 11px; color: white; cursor: pointer; }
        .btn-red { background: #b23b19; }
        .btn-purple { background: #8a2be2; }

        .workspace { flex-grow: 1; background: #020307; position: relative; overflow: hidden; }
        .starfield { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; }

        /* SOLAR SMASH */
        .solar-smash-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .planet { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #2a6ac5, #00bfff, #020307); box-shadow: 0 0 40px rgba(0, 191, 255, 0.5); position: relative; cursor: pointer; pointer-events: auto; transition: transform 0.1s; }
        .planet-health { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 12px; font-size: 10px; border: 1px solid #ff3333; color: #ff3333; width: max-content; }
        .resource-counter { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); color: #00ffaa; font-weight: bold; font-size: 11px; }
        .dmg-text { position: absolute; font-weight: 900; font-size: 24px; color: #ff6a00; pointer-events: none; animation: floatAndFade 0.6s ease-out forwards; }
        @keyframes floatAndFade { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-90px); opacity: 0; } }

        /* WIDGET FLOTANTE PRO */
        .floating-widget { position: absolute; top: 130px; right: 15px; background: rgba(8, 11, 26, 0.95); border: 1px solid #f9b233; border-radius: 20px; padding: 8px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 0 20px rgba(249, 178, 51, 0.25); z-index: 100; touch-action: none; }
        .widget-btn { width: 38px; height: 38px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: white; transition: 0.2s; font-weight: bold; }
        .btn-play { background: #2f80ed; }
        .btn-add { background: #27ae60; }
        .btn-record { background: #b23b19; }
        .btn-ai { background: #f2c94c; color: #000; }
        .btn-clear { background: #4f4f4f; }
        .btn-handle { background: #162044; cursor: move; }

        /* NODOS DE CLIC */
        .click-target-node { position: absolute; width: 34px; height: 34px; border-radius: 50%; border: 3px solid #f9b233; background: rgba(249, 178, 51, 0.2); color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; transform: translate(-50%, -50%); pointer-events: none; }
        .laser-beam { position: absolute; height: 3px; background: #ff2a2a; transform-origin: top left; pointer-events: none; z-index: 90; }

        /* Consola de logs */
        .console-box { height: 90px; background: #010205; color: #f9b233; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-top: 1px solid #141b35; }
    </style>
</head>
<body>

<!-- CARGADOR -->
<div id="loaderScreen">
    <div class="protogen-box">
        <canvas id="protogenCanvas" width="64" height="64"></canvas>
        <span class="loading-text" id="loaderStatusText">Iniciando Red Estelar...</span>
        <div class="loading-bar-container"><div class="loading-bar" id="loadProgressBar"></div></div>
    </div>
</div>

<!-- INTERFAZ PRINCIPAL -->
<div class="app-shell">
    <div class="navbar">
        <h1>🌌 STELAR PRO</h1>
        <div class="nav-controls">
            <button class="nav-btn btn-purple" onclick="toggleAI()">🧠 MODO IA</button>
            <button class="nav-btn btn-red" onclick="toggleRecordMode()">🔴 GRABAR</button>
        </div>
    </div>

    <div class="workspace" id="gameArea" onclick="registerRecordTap(event)">
        <canvas class="starfield" id="starfieldCanvas"></canvas>

        <!-- MODO SOLAR SMASH -->
        <div class="solar-smash-container">
            <div class="planet" id="gamePlanet" onclick="damagePlanet(event)">
                <div class="resource-counter" id="dustCoins">Polvo Estelar: 0</div>
                <div class="planet-health" id="planetHP">HP: 1000 / 1000</div>
            </div>
        </div>

        <!-- WIDGET INTEGRADO MULTIFUNCIÓN -->
        <div class="floating-widget" id="widgetPanel">
            <button class="widget-btn btn-handle" id="dragHandle">☰</button>
            <button class="widget-btn btn-play" onclick="playMacro()" id="btnPlay">▶️</button>
            <button class="widget-btn btn-add" onclick="addNewTargetNode()">➕</button>
            <button class="widget-btn btn-record" onclick="toggleRecordMode()" id="btnRecord">R</button>
            <button class="widget-btn btn-ai" onclick="toggleAI()" id="btnAI">AI</button>
            <button class="widget-btn btn-clear" onclick="clearAllNodes()">🗑️</button>
        </div>
    </div>

    <div class="console-box" id="terminalLogs">> Terminal de Órbita lista. Graba o usa el modo IA dentro de la app.</div>
</div>

<script>
    const loader = document.getElementById('loaderScreen');
    const area = document.getElementById('gameArea');
    const logs = document.getElementById('terminalLogs');
    const widget = document.getElementById('widgetPanel');
    const dragHandle = document.getElementById('dragHandle');
    const planetHPLabel = document.getElementById('planetHP');
    const dustLabel = document.getElementById('dustCoins');
    const progressBar = document.getElementById('loadProgressBar');
    const statusText = document.getElementById('loaderStatusText');

    let registeredNodes = [];
    let isPlaying = false;
    let isRecording = false;
    let isAIMode = false;
    let recordedClicks = [];
    
    let planetHP = 1000;
    let dustCoins = 0;

    function printLog(text) {
        logs.innerHTML += `<br>> ${text}`;
        logs.scrollTop = logs.scrollHeight;
    }

    // --- MEJORA DEL MODELO PROTOGEN PERSONALIZADO (ZORRO ROJO/DORADO) ---
    const protoCanvas = document.getElementById('protogenCanvas');
    const protoCtx = protoCanvas.getContext('2d');
    let protoFrame = 0;

    const C_RED = "#B23B19";     // Rojo base pelaje
    const C_ORANGE = "#E36F26";  // Naranja brillante transiciones
    const C_GOLD = "#F9B233";    // Dorado brillante (visor, orejas, detalles)
    const C_DARK = "#1C1B29";    // Azul oscuro casi negro (visor y partes oscuras)
    const C_GREY = "#2C3E50";    // Placas de armadura
    const C_FRAME = "#8A95A5";   // Marco del visor gris metálico

    function drawPixel(x, y, w, h, color) {
        protoCtx.fillStyle = color;
        protoCtx.fillRect(x, y, w, h);
    }

    function drawProtogen() {
        protoCtx.clearRect(0, 0, 64, 64);
        protoFrame++;

        // Movimiento de respiración para todo el cuerpo
        const breathY = Math.sin(protoFrame * 0.08) * 0.8;

        // 1. Gran cola/ala oscura detrás (a la izquierda)
        drawPixel(8, 12 + breathY, 8, 38, C_DARK);
        drawPixel(16, 10 + breathY, 2, 40, C_GOLD); // Borde dorado de la cola

        // 2. Orejas Grandes (Estilo Zorro)
        // Oreja Izquierda
        drawPixel(16, 4 + breathY, 8, 18, C_RED);
        drawPixel(18, 6 + breathY, 4, 14, C_DARK);
        drawPixel(20, 6 + breathY, 2, 14, C_GOLD); // Brillo interno dorado
        // Oreja Derecha
        drawPixel(40, 4 + breathY, 8, 18, C_RED);
        drawPixel(42, 6 + breathY, 4, 14, C_DARK);
        drawPixel(44, 6 + breathY, 2, 14, C_GOLD); // Brillo interno dorado

        // 3. Pelo superior (Mechones rebeldes)
        drawPixel(26, 8 + breathY, 12, 4, C_RED);
        drawPixel(29, 6 + breathY, 6, 2, C_RED);

        // 4. Mejillas esponjosas a los lados del rostro
        drawPixel(14, 25 + breathY, 6, 10, C_RED);
        drawPixel(44, 25 + breathY, 6, 10, C_RED);
        drawPixel(16, 27 + breathY, 4, 6, C_ORANGE);
        drawPixel(44, 27 + breathY, 4, 6, C_ORANGE);

        // 5. Cuello
        drawPixel(26, 35 + breathY, 12, 6, C_RED);

        // 6. Pecho y hombros con armadura
        drawPixel(18, 41 + breathY, 28, 23, C_RED); // Hombros base
        drawPixel(22, 40 + breathY, 6, 8, C_GREY);   // Hombrera Izq
        drawPixel(36, 40 + breathY, 6, 8, C_GREY);   // Hombrera Der
        drawPixel(24, 42 + breathY, 2, 4, C_GOLD);   // Detalle dorado hombro izq
        drawPixel(38, 42 + breathY, 2, 4, C_GOLD);   // Detalle dorado hombro der
        drawPixel(26, 46 + breathY, 12, 18, C_DARK); // Placa central de pecho
        drawPixel(29, 49 + breathY, 6, 15, C_RED);   // Núcleo rojo de pecho

        // 7. Manos/Parras abajo
        drawPixel(6, 44, 10, 20, C_RED);
        drawPixel(48, 44, 10, 20, C_RED);
        drawPixel(6, 44, 10, 4, C_DARK); // Garras oscuras
        drawPixel(48, 44, 10, 4, C_DARK);

        // 8. Base Cabeza y Marco del Visor
        drawPixel(22, 18 + breathY, 20, 19, C_RED);
        drawPixel(20, 19 + breathY, 24, 17, C_FRAME); // Marco metálico gris

        // 9. Pantalla del Visor (Redondeada)
        drawPixel(22, 20 + breathY, 20, 15, C_DARK);
        drawPixel(24, 21 + breathY, 16, 13, C_DARK);

        // 10. Expresión LED Dorada (Ojos grandes y boca feliz del zorro)
        drawPixel(24, 24 + breathY, 4, 6, C_GOLD); // Ojo Izq
        drawPixel(36, 24 + breathY, 4, 6, C_GOLD); // Ojo Der
        
        drawPixel(31, 28 + breathY, 2, 2, C_GOLD); // Nariz LED

        // Boca tierna W
        drawPixel(28, 31 + breathY, 1, 2, C_GOLD);
        drawPixel(29, 32 + breathY, 2, 1, C_GOLD);
        drawPixel(31, 31 + breathY, 2, 1, C_GOLD);
        drawPixel(33, 32 + breathY, 2, 1, C_GOLD);
        drawPixel(35, 31 + breathY, 1, 2, C_GOLD);

        requestAnimationFrame(drawProtogen);
    }
    drawProtogen();

    // --- CARGADOR DE PANTALLA ---
    let progress = 0;
    const loadInterval = setInterval(() => {
        progress += 4;
        progressBar.style.width = `${progress}%`;
        if (progress >= 100) {
            clearInterval(loadInterval);
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 600);
        }
    }, 50);

    // --- MODO GRABAR (RECORD MODE) ---
    function toggleRecordMode() {
        isRecording = !isRecording;
        const btn = document.getElementById('btnRecord');
        if (isRecording) {
            recordedClicks = [];
            btn.style.background = "#ff9f43";
            btn.innerText = "⏺️";
            printLog("Modo grabación ACTIVADO. Toca cualquier parte del espacio para registrar clics.");
        } else {
            btn.style.background = "#b23b19";
            btn.innerText = "R";
            printLog(`Grabación FINALIZADA. Guardados ${recordedClicks.length} clics.`);
        }
    }

    function registerRecordTap(e) {
        if (!isRecording) return;
        if (e.target.closest('#widgetPanel') || e.target.closest('.navbar')) return;

        const rect = area.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        recordedClicks.push({ x, y });
        createTempVisualNode(x, y);
        printLog(`Punto registrado: [X:${Math.round(x)} Y:${Math.round(y)}]`);
    }

    function createTempVisualNode(x, y) {
        const temp = document.createElement('div');
        temp.className = 'click-target-node';
        temp.style.borderColor = '#ff9f43';
        temp.style.left = `${x}px`;
        temp.style.top = `${y}px`;
        temp.innerText = "R";
        area.appendChild(temp);
        setTimeout(() => temp.remove(), 1000);
    }

    // --- MODO INTELIGENCIA ARTIFICIAL (AI MODE) ---
    function toggleAI() {
        isAIMode = !isAIMode;
        const btn = document.getElementById('btnAI');
        if (isAIMode) {
            btn.style.background = "#27ae60";
            btn.style.color = "#fff";
            printLog("Modo IA activado. Analizando patrones espaciales...");
            runAIScan();
        } else {
            btn.style.background = "#f2c94c";
            btn.style.color = "#000";
            printLog("Modo IA desactivado.");
        }
    }

    async function runAIScan() {
        while (isAIMode) {
            const planetEl = document.getElementById('gamePlanet');
            const pRect = planetEl.getBoundingClientRect();
            const aRect = area.getBoundingClientRect();

            const targetX = pRect.left + pRect.width / 2 - aRect.left + (Math.random() * 40 - 20);
            const targetY = pRect.top + pRect.height / 2 - aRect.top + (Math.random() * 40 - 20);

            shootLaser(targetX, targetY);
            damagePlanet({ clientX: targetX + aRect.left, clientY: targetY + aRect.top });

            await new Promise(r => setTimeout(r, 200));
        }
    }

    // --- REPRODUCIR CLICS / MACRO GRABADO ---
    async function playMacro() {
        if (isPlaying) {
            isPlaying = false;
            document.getElementById('btnPlay').innerText = "▶️";
            printLog("Macro pausada.");
            return;
        }

        const nodesToRun = isRecording ? recordedClicks : registeredNodes;
        if (nodesToRun.length === 0) {
            printLog("No hay clics grabados ni nodos creados. Usa [+] o graba con [R] primero.");
            return;
        }

        isPlaying = true;
        document.getElementById('btnPlay').innerText = "⏸️";
        printLog("Iniciando ciclo de auto-clicker...");

        while (isPlaying) {
            for (let node of nodesToRun) {
                if (!isPlaying) break;
                shootLaser(node.x, node.y);
                damagePlanet({ clientX: node.x + area.getBoundingClientRect().left, clientY: node.y + area.getBoundingClientRect().top });
                await new Promise(r => setTimeout(r, 400));
            }
        }
    }

    // --- COSAS BÁSICAS DEL SIMULADOR ---
    function damagePlanet(e) {
        planetHP -= 50;
        if (planetHP <= 0) {
            planetHP = 1000;
            dustCoins += 100;
            dustLabel.innerText = `Polvo Estelar: ${dustCoins}`;
        }
        planetHPLabel.innerText = `HP: ${planetHP} / 1000`;

        const text = document.createElement('div');
        text.className = 'dmg-text';
        text.innerText = `-50`;
        text.style.left = `${e.clientX}px`;
        text.style.top = `${e.clientY}px`;
        document.body.appendChild(text);
        setTimeout(() => text.remove(), 600);
    }

    function addNewTargetNode() {
        const id = registeredNodes.length + 1;
        const node = document.createElement('div');
        node.className = 'click-target-node';
        node.innerText = id;

        const x = Math.floor(Math.random() * (area.clientWidth - 100)) + 50;
        const y = Math.floor(Math.random() * (area.clientHeight - 180)) + 120;

        node.style.left = `${x}px`;
        node.style.top = `${y}px`;

        area.appendChild(node);
        registeredNodes.push({ element: node, x, y });
        printLog(`Baliza de disparo registrada #${id} [X:${x} Y:${y}]`);
    }

    function shootLaser(targetX, targetY) {
        const laser = document.createElement('div');
        laser.className = 'laser-beam';
        const wRect = widget.getBoundingClientRect();
        const aRect = area.getBoundingClientRect();

        const startX = wRect.left + 19 - aRect.left;
        const startY = wRect.top + 19 - aRect.top;

        const angle = Math.atan2(targetY - startY, targetX - startX);
        const distance = Math.hypot(targetY - startY, targetX - startX);

        laser.style.width = `${distance}px`;
        laser.style.left = `${startX}px`;
        laser.style.top = `${startY}px`;
        laser.style.transform = `rotate(${angle}rad)`;

        area.appendChild(laser);
        setTimeout(() => { laser.style.opacity = '0'; setTimeout(() => laser.remove(), 100); }, 80);
    }

    function clearAllNodes() {
        document.querySelectorAll('.click-target-node').forEach(n => n.remove());
        registeredNodes = [];
        recordedClicks = [];
        printLog("Memoria limpia de coordenadas.");
    }

    // --- ARRASTRE DEL WIDGET ---
    let activeDrag = false;
    let currentX, currentY, initialX, initialY;
    let xOffset = 0, yOffset = 0;

    dragHandle.addEventListener('touchstart', (e) => {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
        activeDrag = true;
    });

    document.addEventListener('touchmove', (e) => {
        if (activeDrag) {
            e.preventDefault();
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            widget.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
    }, { passive: false });

    document.addEventListener('touchend', () => { activeDrag = false; });
</script>
</body>
</html>
