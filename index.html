<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Macro & Bot Lab Professional</title>
    <!-- Configuración para instalar como App (PWA) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlJvYm90IE1hY3JvIiwKICAic2hvcnRfbmFtZSI6ICJNYWNyb0JvdCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMTJhMThhIiwKICAidGhlbWVfY29sb3IiOiAiI2ZmMDAwMCIKfQ==">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f0f12; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 420px; background: #18181c; border-radius: 12px; padding: 15px; border: 1px solid #2e2e36; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h3 { color: #ff3333; margin-top: 0; margin-bottom: 5px; text-align: center; letter-spacing: 1px; }
        .sub-tag { text-align: center; font-size: 11px; color: #777; margin-bottom: 15px; text-transform: uppercase; }
        
        #btnInstall { background: #00cc66; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-bottom: 15px; display: none; width: 100%; transition: background 0.2s; }
        #btnInstall:hover { background: #00b359; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; transition: 0.2s; }
        .btn-record { background: #e63c12; border-bottom: 3px solid #b32a09; }
        .btn-play { background: #0088cc; border-bottom: 3px solid #006699; }
        .btn-detect { background: #d4af37; color: black; border-bottom: 3px solid #aa8c2c; }
        .btn-spawn { background: #44444a; border-bottom: 3px solid #2d2d31; }
        button:active { transform: translateY(2px); border-bottom-width: 1px; }

        .game-area { width: 100%; height: 260px; background: #070709; border: 2px solid #ff3333; position: relative; overflow: hidden; border-radius: 8px; margin-bottom: 12px; }
        .area-label { position: absolute; top: 8px; left: 8px; color: #33333a; font-size: 11px; font-weight: bold; pointer-events: none; }
        
        /* Objeto del juego (como en Sols RNG) */
        .item { width: 35px; height: 35px; background: #d4af37; position: absolute; border-radius: 50%; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 10px #d4af37; display: flex; align-items: center; justify-content: center; font-size: 16px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.1); } }

        .click-dot { position: absolute; width: 12px; height: 12px; background: #00ffcc; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; animation: ping 0.3s ease-out; }
        @keyframes ping { to { width: 30px; height: 30px; opacity: 0; } }

        .log { width: 100%; height: 95px; background: #000; color: #00ff66; padding: 8px; overflow-y: auto; font-family: monospace; font-size: 11px; border-radius: 6px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <h3>Macro-Lab & Bot Simulator</h3>
    <div class="sub-tag">Mobile Framework v2.1.0</div>
    
    <button id="btnInstall">📲 INSTALAR EN PANTALLA DE INICIO</button>

    <div class="controls">
        <button class="btn-record" id="btnRec" onclick="toggleRecord()">⏺️ GRABAR</button>
        <button class="btn-play" onclick="playMacro()">▶️ REPRODUCIR</button>
        <button class="btn-detect" id="btnDet" onclick="toggleSmartDetection()">🤖 BOT AUTO-CLAIM (OFF)</button>
        <button class="btn-spawn" onclick="spawnItem()">✨ SPAWN OBJETO (SOLS RNG)</button>
    </div>

    <div class="game-area" id="gameArea">
        <div class="area-label">ZONA DE JUEGO (SIMULADOR DE ROBLOX)</div>
    </div>

    <div class="log" id="console">> Sistema inicializado. Selecciona un modo de operación superior.</div>
</div>

<script>
    // --- SECCIÓN 1: CONFIGURACIÓN DE ELEMENTOS ---
    const area = document.getElementById('gameArea');
    const logs = document.getElementById('console');
    const btnRec = document.getElementById('btnRec');
    const btnDet = document.getElementById('btnDet');
    const btnInstall = document.getElementById('btnInstall');

    // --- SECCIÓN 2: ESTADOS Y VARIABLES DEL MACRO ---
    let mode = 'IDLE'; 
    let macroEvents = [];
    let startTime = 0;
    let smartInterval = null;
    let isPlaying = false;

    // --- SECCIÓN 3: CONSOLA DE EVENTOS ---
    function log(msg) { 
        logs.innerHTML += `<br>> ${msg}`; 
        logs.scrollTop = logs.scrollHeight; 
    }

    // --- SECCIÓN 4: MANEJO DE INSTALACIÓN PWA (ESTILO APK) ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btnInstall.style.display = 'block';
    });

    btnInstall.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                log("Instalación completada con éxito.");
                btnInstall.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // Registro seguro de Service Worker en memoria volátil
    if ('serviceWorker' in navigator) {
        const sw = `self.addEventListener('fetch', (e) => {});`;
        const blob = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    }

    // --- SECCIÓN 5: CAPTURA DE TOQUES EN LA PANTALLA ---
    area.addEventListener('mousedown', (e) => {
        // Evitamos que los clicks en los objetos interfieran en el registro puro de coordenadas
        if (e.target.classList.contains('item')) return; 

        const rect = area.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Validación de límites de pantalla
        if (x >= 0 && x <= area.clientWidth && y >= 0 && y <= area.clientHeight) {
            createClickEffect(x, y);

            if (mode === 'RECORD') {
                const timeOffset = Date.now() - startTime;
                macroEvents.push({ x, y, time: timeOffset });
                log(`Acción guardada -> Coord[X: ${Math.round(x)}, Y: ${Math.round(y)}] a los ${timeOffset}ms`);
            }
        }
    });

    // --- SECCIÓN 6: ANIMACIONES VISUALES ---
    function createClickEffect(x, y) {
        const dot = document.createElement('div');
        dot.className = 'click-dot';
        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
        area.appendChild(dot);
        setTimeout(() => {
            if (dot && dot.parentNode) {
                dot.remove();
            }
        }, 300);
    }

    // --- SECCIÓN 7: LÓGICA DE MODOS DE EJECUCIÓN ---

    // Modo 1: Grabación Secuencial
    function toggleRecord() {
        if (isPlaying) {
            log("No puedes grabar mientras se reproduce una macro.");
            return;
        }

        if (mode === 'RECORD') {
            mode = 'IDLE';
            btnRec.style.background = '#e63c12';
            btnRec.innerText = '⏺️ GRABAR';
            log(`Proceso completado. Registros capturados: ${macroEvents.length}`);
        } else {
            // Limpieza de subprocesos activos
            if (mode === 'DETECT') toggleSmartDetection();
            mode = 'RECORD';
            macroEvents = [];
            startTime = Date.now();
            btnRec.style.background = '#111';
            btnRec.innerText = '⏹️ DETENER';
            log("Monitoreo activo. Registrando pulsaciones dentro del simulador...");
        }
    }

    // Reproducción de Grabación
    async function playMacro() {
        if (mode === 'RECORD' || mode === 'DETECT') {
            log("Detén los modos activos antes de iniciar la reproducción.");
            return;
        }

        if (macroEvents.length === 0) {
            log("Búfer de macro vacío. Graba acciones primero.");
            return;
        }

        isPlaying = true;
        log("Iniciando secuencia de macro guardada...");
        
        for (let i = 0; i < macroEvents.length; i++) {
            if (!isPlaying) break; // Interrupción manual por seguridad
            
            const step = macroEvents[i];
            let delay = i === 0 ? step.time : step.time - macroEvents[i-1].time;
            if (delay < 0) delay = 0;

            await new Promise(res => setTimeout(res, delay));
            createClickEffect(step.x, step.y);
            log(`[Autómata] Clic coordinado en X:${Math.round(step.x)} Y:${Math.round(step.y)}`);
        }
        
        isPlaying = false;
        log("Secuencia de comandos finalizada.");
    }

    // Modo 2: Escáner de Objetos (IA Auto-Claim)
    function toggleSmartDetection() {
        if (mode === 'DETECT') {
            mode = 'IDLE';
            if (smartInterval) {
                clearInterval(smartInterval);
                smartInterval = null;
            }
            btnDet.style.background = '#d4af37';
            btnDet.style.color = 'black';
            btnDet.innerText = '🤖 BOT AUTO-CLAIM (OFF)';
            log("Búsqueda de objetivos desactivada.");
        } else {
            if (mode === 'RECORD') toggleRecord(); 
            if (isPlaying) isPlaying = false;

            mode = 'DETECT';
            btnDet.style.background = '#00cc66';
            btnDet.style.color = 'white';
            btnDet.innerText = '🤖 BOT AUTO-CLAIM (ON)';
            log("Algoritmo de detección activo. Buscando targets...");
            
            // Proceso de escaneo en tiempo real (cada 300ms)
            smartInterval = setInterval(() => {
                if (mode !== 'DETECT') return;
                
                const targets = area.querySelectorAll('.item');
                if (targets.length > 0) {
                    targets.forEach(item => {
                        const rect = item.getBoundingClientRect();
                        const areaRect = area.getBoundingClientRect();
                        const x = (rect.left + rect.width / 2) - areaRect.left;
                        const y = (rect.top + rect.height / 2) - areaRect.top;
                        
                        log(`[AI Detect] Target en X:${Math.round(x)} Y:${Math.round(y)}. Ejecutando autoclick.`);
                        createClickEffect(x, y);
                        item.click(); 
                    });
                }
            }, 300); 
        }
    }

    // Generador de Objetos Interactivos
    function spawnItem() {
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = '⭐';
        
        const maxX = area.clientWidth - 40;
        const maxY = area.clientHeight - 40;
        
        // Asignación de coordenadas aleatorias controladas
        item.style.left = `${Math.max(10, Math.random() * maxX)}px`;
        item.style.top = `${Math.max(10, Math.random() * maxY)}px`;
        
        item.onclick = function() {
            this.remove();
            log("Objetivo consumido por el script.");
        };
        
        area.appendChild(item);
        log("Nuevo objetivo spawnado en coordenadas aleatorias.");
    }
</script>

</body>
</html>
