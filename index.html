<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frostbound: Echoes of the Sky - Prototype</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #050811;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            max-width: 640px;
            height: 100vh;
            max-height: 480px;
            border: 4px solid #3a5fcd;
            box-shadow: 0 0 20px rgba(58, 95, 205, 0.5);
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #8fa3db;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
    </div>
    
    <div id="instructions">
        <strong>Controles:</strong> Usa las <strong>Flechas del teclado</strong> o <strong>arrastra el dedo en pantalla</strong> para mover el alma de Kiba. ¡Esquiva las estrellas!
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // ESTADOS DEL JUEGO: "loading", "battle"
        let gameState = "loading";
        let loadProgress = 0;

        // Propiedades del Jugador (Kiba / Alma de Escarcha)
        const player = {
            x: 320,
            y: 340,
            size: 16,
            speed: 5,
            isDragging: false
        };

        // Teclas presionadas
        const keys = {};

        // Configuración de la caja de batalla (Estilo Undertale)
        const battleBox = {
            x: 170,
            y: 220,
            width: 300,
            height: 200
        };

        // Proyectiles (Estrellas caídas)
        let stars = [];
        let starSpawnTimer = 0;

        // Escuchar teclado
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        // Escuchar eventos táctiles (Soporte móvil/iPad)
        canvas.addEventListener("touchstart", (e) => {
            const rect = canvas.getBoundingClientRect();
            const touchX = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
            const touchY = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height;

            // Si tocamos cerca del jugador, activamos el arrastre
            const dist = Math.hypot(touchX - player.x, touchY - player.y);
            if (dist < 40) {
                player.isDragging = true;
            }
        });

        canvas.addEventListener("touchmove", (e) => {
            if (player.isDragging && gameState === "battle") {
                const rect = canvas.getBoundingClientRect();
                let touchX = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
                let touchY = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height;

                // Limitar movimiento dentro de la caja de batalla
                player.x = Math.max(battleBox.x + player.size, Math.min(battleBox.x + battleBox.width - player.size, touchX));
                player.y = Math.max(battleBox.y + player.size, Math.min(battleBox.y + battleBox.height - player.size, touchY));
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener("touchend", () => {
            player.isDragging = false;
        });

        // DIBUJAR AL PROTAGONISTA (Zorro Ártico Vectorial)
        function drawKiba(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);

            // Orejas traseras (sombras)
            ctx.fillStyle = "#a8bde3";
            ctx.beginPath();
            ctx.moveTo(-35, -40); ctx.lineTo(-15, -75); ctx.lineTo(-5, -45);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(35, -40); ctx.lineTo(15, -75); ctx.lineTo(5, -45);
            ctx.fill();

            // Orejas delanteras (blancas)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(-30, -35); ctx.lineTo(-15, -70); ctx.lineTo(-5, -40);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(30, -35); ctx.lineTo(15, -70); ctx.lineTo(5, -40);
            ctx.fill();

            // Interior de las orejas (Azul hielo / Celestial)
            ctx.fillStyle = "#7ca1db";
            ctx.beginPath();
            ctx.moveTo(-25, -35); ctx.lineTo(-15, -60); ctx.lineTo(-10, -40);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(25, -35); ctx.lineTo(15, -60); ctx.lineTo(10, -40);
            ctx.fill();

            // Cabeza (Base blanca)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(0, -10, 35, 0, Math.PI * 2);
            ctx.fill();

            // Mejillas esponjosas del zorro
            ctx.beginPath();
            ctx.moveTo(-35, -10);
            ctx.quadraticCurveTo(-50, 0, -35, 10);
            ctx.lineTo(-20, 10);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(35, -10);
            ctx.quadraticCurveTo(50, 0, 35, 10);
            ctx.lineTo(20, 10);
            ctx.fill();

            // Ojos grandes azules
            ctx.fillStyle = "#00d2ff";
            ctx.beginPath();
            ctx.arc(-13, -15, 6, 0, Math.PI * 2);
            ctx.arc(13, -15, 6, 0, Math.PI * 2);
            ctx.fill();

            // Brillo de los ojos
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(-15, -17, 2, 0, Math.PI * 2);
            ctx.arc(11, -17, 2, 0, Math.PI * 2);
            ctx.fill();

            // Hocico
            ctx.fillStyle = "#d0def2";
            ctx.beginPath();
            ctx.moveTo(-8, -5);
            ctx.lineTo(8, -5);
            ctx.lineTo(0, 5);
            ctx.closePath();
            ctx.fill();

            // Nariz negra pequeña
            ctx.fillStyle = "#202b3d";
            ctx.beginPath();
            ctx.arc(0, 0, 3, 0, Math.PI * 2);
            ctx.fill();

            // Bufanda de Kiba (Azul oscuro flotando con polvo de estrellas)
            ctx.fillStyle = "#1d3363";
            ctx.beginPath();
            ctx.ellipse(0, 25, 25, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Detalle de la bufanda colgando
            ctx.beginPath();
            ctx.moveTo(-15, 25);
            ctx.lineTo(-30, 45);
            ctx.lineTo(-18, 50);
            ctx.lineTo(-5, 27);
            ctx.fill();

            // Pequeños brillos de estrellas en la bufanda
            ctx.fillStyle = "#7ef0ff";
            ctx.fillRect(-22, 38, 2, 2);
            ctx.fillRect(-18, 44, 2, 2);

            ctx.restore();
        }

        // CONTROL DE PANTALLA DE CARGA
        function updateLoading() {
            if (loadProgress < 100) {
                loadProgress += 0.8; // Simula la velocidad de carga
            } else {
                gameState = "battle";
            }
        }

        function drawLoading() {
            // Fondo Espacial Oscuro
            ctx.fillStyle = "#040712";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas de fondo decorativas
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fillRect(100, 80, 2, 2);
            ctx.fillRect(500, 120, 3, 3);
            ctx.fillRect(150, 350, 2, 2);
            ctx.fillRect(480, 300, 1, 1);

            // Dibujar al zorro Kiba en el centro
            drawKiba(320, 200, 1.3);

            // Texto "Cargando..."
            ctx.fillStyle = "#eef4ff";
            ctx.font = "20px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("Cargando el Subsuelo...", 320, 310);

            // Marco de barra de carga
            ctx.strokeStyle = "#3a5fcd";
            ctx.lineWidth = 3;
            ctx.strokeRect(170, 340, 300, 20);

            // Relleno de la barra (Gradiente azul helado)
            ctx.fillStyle = "#00d2ff";
            ctx.fillRect(174, 344, (292 * loadProgress) / 100, 12);
            
            // Texto del porcentaje
            ctx.fillStyle = "#8fa3db";
            ctx.font = "14px 'Courier New'";
            ctx.fillText(`${Math.floor(loadProgress)}%`, 320, 385);
        }

        // LÓGICA DE COMBATE (BATTLE STATE)
        function updateBattle() {
            // Movimiento por teclado (Flechas)
            if (keys["ArrowUp"]) player.y -= player.speed;
            if (keys["ArrowDown"]) player.y += player.speed;
            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;

            // Limitar al jugador dentro de la caja de Undertale
            player.x = Math.max(battleBox.x + player.size, Math.min(battleBox.x + battleBox.width - player.size, player.x));
            player.y = Math.max(battleBox.y + player.size, Math.min(battleBox.y + battleBox.height - player.size, player.y));

            // Generador de estrellas de "The star that doesn't want to fall"
            starSpawnTimer++;
            if (starSpawnTimer > 25) { // Spawn cada ~25 frames
                stars.push({
                    x: battleBox.x + Math.random() * (battleBox.width - 20) + 10,
                    y: battleBox.y - 10,
                    size: 8 + Math.random() * 8,
                    speed: 2 + Math.random() * 3,
                    angle: 0,
                    rotSpeed: 0.05 + Math.random() * 0.05
                });
                starSpawnTimer = 0;
            }

            // Actualizar estrellas y comprobar colisiones
            for (let i = stars.length - 1; i >= 0; i--) {
                let s = stars[i];
                s.y += s.speed;
                s.angle += s.rotSpeed;

                // Colisión simple con el alma
                let dist = Math.hypot(player.x - s.x, player.y - s.y);
                if (dist < player.size + s.size/2) {
                    // Colisión: Animación de parpadeo del alma (reducir salud/reiniciar en este prototipo)
                    player.x = 320;
                    player.y = 340;
                    stars = []; // Limpiar pantalla al recibir golpe
                    break;
                }

                // Eliminar estrellas fuera de la caja
                if (s.y > battleBox.y + battleBox.height) {
                    stars.splice(i, 1);
                }
            }
        }

        function drawBattle() {
            // Limpiar fondo
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar la interfaz del enemigo (La estrella colapsando)
            ctx.fillStyle = "#eef4ff";
            ctx.font = "16px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText("The star that doesn't want to fall", 320, 40);

            // Dibujar al jefe (Estrella caída titilante)
            const time = Date.now() * 0.005;
            const pulse = 1 + Math.sin(time) * 0.1;
            drawBossStar(320, 110, 40 * pulse);

            // Caja de Batalla
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 4;
            ctx.strokeRect(battleBox.x, battleBox.y, battleBox.width, battleBox.height);

            // Dibujar las Estrellas Proyectiles
            stars.forEach(s => {
                drawStarProjectile(s.x, s.y, s.size, s.angle);
            });

            // Dibujar el Alma del Jugador: "Corazón de Escarcha" (Azul con orejas de zorro)
            drawPlayerSoul(player.x, player.y);
        }

        // Dibujar el alma en forma de corazón con pequeñas orejitas de zorro ártico
        function drawPlayerSoul(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // Pequeñas orejas del alma
            ctx.fillStyle = "#00d2ff";
            ctx.beginPath();
            ctx.moveTo(-10, -8); ctx.lineTo(-12, -15); ctx.lineTo(-4, -10);
            ctx.moveTo(10, -8); ctx.lineTo(12, -15); ctx.lineTo(4, -10);
            ctx.fill();

            // Corazón
            ctx.fillStyle = "#00e1ff";
            ctx.beginPath();
            ctx.moveTo(0, 10);
            // Curva izquierda
            ctx.bezierCurveTo(-12, 0, -12, -10, 0, -10);
            // Curva derecha
            ctx.bezierCurveTo(12, -10, 12, 0, 0, 10);
            ctx.fill();

            // Brillo interior blanco
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(-3, -4, 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Dibujar proyectil de estrella rotatoria
        function drawStarProjectile(cx, cy, r, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.fillStyle = "#7ce5ff";
            ctx.shadowColor = "#0099ff";
            ctx.shadowBlur = 10;
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * r, -Math.sin((18 + i * 72) * Math.PI / 180) * r);
                ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (r/2), -Math.sin((54 + i * 72) * Math.PI / 180) * (r/2));
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // Dibujar jefe (Estrella gigante colapsando / Fase 2)
        function drawBossStar(cx, cy, r) {
            ctx.save();
            ctx.translate(cx, cy);
            
            // Halo de energía distorsionado
            const t = Date.now() * 0.01;
            ctx.rotate(t * 0.2);
            ctx.fillStyle = "rgba(100, 180, 255, 0.2)";
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
                ctx.lineTo(Math.cos((i * 45) * Math.PI / 180) * (r * 1.3), -Math.sin((i * 45) * Math.PI / 180) * (r * 1.3));
                ctx.lineTo(Math.cos((22.5 + i * 45) * Math.PI / 180) * (r * 0.7), -Math.sin((22.5 + i * 45) * Math.PI / 180) * (r * 0.7));
            }
            ctx.closePath();
            ctx.fill();

            // Estrella principal (Brillante)
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "#00c3ff";
            ctx.shadowBlur = 20;
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * r, -Math.sin((18 + i * 72) * Math.PI / 180) * r);
                ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (r * 0.4), -Math.sin((54 + i * 72) * Math.PI / 180) * (r * 0.4));
            }
            ctx.closePath();
            ctx.fill();

            // Ojos de pánico del jefe (Temblorosos por la Fase 2)
            const shake = Math.sin(t * 5) * 1.5;
            ctx.fillStyle = "#0c152b";
            ctx.beginPath();
            ctx.arc(-8 + shake, -2, 3, 0, Math.PI * 2);
            ctx.arc(8 + shake, -2, 3, 0, Math.PI * 2);
            ctx.fill();

            // Boca preocupada / asustada
            ctx.strokeStyle = "#0c152b";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0 + shake, 6, 4, Math.PI, 0, false); // Triste / asustada
            ctx.stroke();

            ctx.restore();
        }

        // BUCLE PRINCIPAL DEL JUEGO
        function loop() {
            if (gameState === "loading") {
                updateLoading();
                drawLoading();
            } else if (gameState === "battle") {
                updateBattle();
                drawBattle();
            }
            requestAnimationFrame(loop);
        }

        // Arrancar juego
        loop();
    </script>
</body>
</html>
